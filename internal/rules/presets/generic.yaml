version: 1

handlers:
  match:
    package_names:
      - grpc
    file_path_contains:
      - /grpc/
  signature:
    require_context_first_arg: true
    require_pointer_request: true
    require_pointer_response: true
    require_error_return: true

layers:
  - name: usecase
    match:
      call_name_contains:
        - usecase
      receiver_type_contains:
        - usecase
      file_path_contains:
        - /usecase/
        - /usecases/

  - name: service
    match:
      call_name_contains:
        - service
      receiver_type_contains:
        - service
      file_path_contains:
        - /service/
        - /services/

  - name: repository
    match:
      call_name_contains:
        - repository
      receiver_type_contains:
        - repository
      file_path_contains:
        - /repository/
        - /repositories/

  - name: external_client
    match:
      call_name_contains:
        - client
      receiver_type_contains:
        - client
      file_path_contains:
        - /client/
        - /clients/

  - name: converter
    match:
      call_name_contains:
        - converter
      receiver_type_contains:
        - converter
      file_path_contains:
        - /converter/
        - /converters/
      method_name_prefixes:
        - convert

  - name: model
    match:
      call_name_contains:
        - model.
      receiver_type_contains:
        - model
      file_path_contains:
        - /model/
        - /models/

ignore:
  standard_library: true
  calls:
    full_names:
      - err.Error
      - context.Background
      - context.TODO
    package_names:
      - status
    method_names:
      - Close
      - GRPCStatus
      - IsZero
      - Nanosecond
      - Unix
  getters:
    local_values: true
    receiver_names:
      - in
      - req
      - request
      - resp
      - response

resolution:
  skip_implementations:
    receiver_name_prefixes:
      - Mock
      - Fake
    file_path_contains:
      - /mock/
      - /mocks/
      - /fake/
      - /fakes/
