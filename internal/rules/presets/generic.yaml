handlers:
  package_names:
    - grpc
  path_contains:
    - /grpc/
  require_context_first_arg: true
  require_pointer_request: true
  require_pointer_response: true
  require_error_return: true

classifiers:
  - layer: service
    symbol_contains:
      - service
    type_contains:
      - service
    path_contains:
      - /service/
  - layer: usecase
    symbol_contains:
      - usecase
      - use_case
    type_contains:
      - usecase
    path_contains:
      - /usecase/
  - layer: repository
    symbol_contains:
      - repository
      - repo
      - store
    type_contains:
      - repository
      - repo
      - store
    path_contains:
      - /repository/
      - /repositories/
      - /repo/
  - layer: external_client
    symbol_contains:
      - client
    type_contains:
      - client
  - layer: converter
    method_prefixes:
      - convert
    method_contains:
      - toentity
      - topb
      - toproto
  - layer: model
    symbol_contains:
      - model.
      - entity.

ignore_calls:
  auto_stdlib: true
  symbols:
    - err.Error
    - context.Background
  packages:
    - status
  methods:
    - Close
    - GRPCStatus
    - IsZero
    - Nanosecond
    - Unix
  local_getters: true
  proto_getter_receivers:
    - in
    - req
    - request
    - resp
    - response

implementation:
  mock_receiver_prefixes:
    - Mock
  mock_path_contains:
    - /mocks/
