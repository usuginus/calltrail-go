version: 1

handlers:
  match:
    package_names:
      - grpc
    file_path_contains:
      - /grpc/
  signature:
    require_context_first_arg: true
    require_pointer_request: true
    require_pointer_response: true
    require_error_return: true

layers:
  - name: usecase
    match:
      call_name_contains:
        - usecase
      receiver_type_contains:
        - usecase
      file_path_contains:
        - /usecase/
        - /usecases/

  - name: service
    match:
      call_name_contains:
        - service
      receiver_type_contains:
        - service
      file_path_contains:
        - /service/
        - /services/

  - name: external_client
    match:
      call_name_contains:
        - client
        - webapi
        - gateway
        - integration
        - provider
      receiver_type_contains:
        - client
        - webapi
        - gateway
        - integration
        - provider
      file_path_contains:
        - /client/
        - /clients/
        - /webapi/
        - /gateway/
        - /gateways/
        - /integration/
        - /integrations/
        - /provider/
        - /providers/

  - name: repository
    match:
      call_name_contains:
        - repository
        - repo.
        - .repo.
      receiver_type_contains:
        - repository
        - repo
      file_path_contains:
        - /repository/
        - /repositories/
        - /repo/
        - /repos/
        - /persistent/
        - /persistence/
        - /dao/

  - name: converter
    match:
      call_name_contains:
        - converter
      receiver_type_contains:
        - converter
      file_path_contains:
        - /converter/
        - /converters/
      method_name_prefixes:
        - convert

  - name: model
    match:
      call_name_contains:
        - model.
        - entity.
        - valueobject.
        - aggregate.
      receiver_type_contains:
        - model
        - entity
        - valueobject
        - aggregate
      file_path_contains:
        - /model/
        - /models/
        - /entity/
        - /entities/
        - /valueobject/
        - /valueobjects/
        - /aggregate/
        - /aggregates/

ignore:
  standard_library: true
  calls:
    full_names:
      - err.Error
      - context.Background
      - context.TODO
    package_names:
      - status
    method_names:
      - Close
      - GRPCStatus
      - IsZero
      - Nanosecond
      - Unix
  getters:
    local_values: true
    receiver_names:
      - in
      - req
      - request
      - resp
      - response

resolution:
  skip_implementations:
    receiver_name_prefixes:
      - Mock
      - Fake
    file_path_contains:
      - /mock/
      - /mocks/
      - /fake/
      - /fakes/
